<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .carousel-indicators [data-bs-target] {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background-color: #ccc;
}

.carousel-indicators .active {
  background-color: orange;
}
</style>

<body>

<section class="text-center py-5">

  <!-- Header -->
  <h2 class="fw-bold">What Our Students Say</h2>
  <p class="text-muted w-50 mx-auto">
    Belis nisl adipiscing sapien sed malesu diame lacus eget erat Cras mollis
  </p>

  <!-- Carousel -->
  <div id="testimonialCarousel" class="carousel slide mt-5">

    <div class="carousel-inner">

      <!-- Slide 1 -->
      <div class="carousel-item active">
        <div class="container">
          <div class="row justify-content-center">

            <div class="col-md-5 bg-light p-4 m-2 rounded">
              Testimonial 1
            </div>

            <div class="col-md-5 bg-light p-4 m-2 rounded">
              Testimonial 2
            </div>

          </div>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-item">
        <div class="container">
          <div class="row justify-content-center">

            <div class="col-md-5 bg-light p-4 m-2 rounded">
              Testimonial 3
            </div>

            <div class="col-md-5 bg-light p-4 m-2 rounded">
              Testimonial 4
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- Dots -->
    <div class="carousel-indicators position-static mt-4">
      <button type="button" data-bs-target="#testimonialCarousel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#testimonialCarousel" data-bs-slide-to="1"></button>
    </div>

  </div>

</section>

<!-- Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
